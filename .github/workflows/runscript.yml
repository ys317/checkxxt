name: 学习通作业检测

on:
  schedule:
    # 每天定时运行（注意：GitHub Actions 的 cron 使用的是 UTC 世界标准时间）
    # 北京时间(UTC+8) 早上 08:00 = UTC时间 00:00
    # 北京时间(UTC+8) 晚上 20:00 = UTC时间 12:00
    - cron: "0 0,12 * * *"
  workflow_dispatch:

jobs:
  run-crawler:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: 安装 Python 依赖库
        run: |
          python -m pip install --upgrade pip
          pip install requests playwright

      - name: 安装 Playwright 浏览器内核
        run: |
          # 只安装 chromium 内核及 Linux 系统底层依赖以节省 Actions 时间和带宽
          python -m playwright install chromium --with-deps

      - name: 运行超星检测脚本
        env:
          ENABLE_WECOM_PUSH: ${{ secrets.ENABLE_WECOM_PUSH }}
          WECOM_URL: ${{ secrets.WECOM_URL }}
          PHONE: ${{ secrets.PHONE }}
          PASSWORD: ${{ secrets.PASSWORD }}
        run: |
          python checkxxt_Github.py
