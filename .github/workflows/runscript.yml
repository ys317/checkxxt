name: 学习通作业检测

on:
  push:
    branches: [ main ] # 当你提交代码到 main 分支时触发运行
  schedule:
    # 每天定时运行（注意：GitHub Actions 的 cron 使用的是 UTC 世界标准时间）
    # 北京时间(UTC+8) 早上 08:00 = UTC时间 00:00
    # 北京时间(UTC+8) 晚上 20:00 = UTC时间 12:00
    - cron: '0 0,12 * * *'
  workflow_dispatch: 

jobs:
  run-crawler:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v3

    - name: 设置 Python 环境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10' 

    - name: 安装 Python 依赖库
      run: |
        python -m pip install --upgrade pip
        pip install requests playwright playwright-stealth 

    - name: 安装 Playwright 浏览器内核
      run: |
        # 只安装 chromium 内核及 Linux 系统底层依赖以节省 Actions 时间和带宽
        python -m playwright install chromium --with-deps

    - name: 安装虚拟显示器工具 (Xvfb)
      run: sudo apt-get update && sudo apt-get install -y xvfb

    - name: 运行超星检测脚本 (使用虚拟屏幕)
      env:
        ENABLE_WECOM_PUSH: ${{ secrets.ENABLE_WECOM_PUSH }}
        WECOM_URL: ${{ secrets.WECOM_URL }}
        PHONE: ${{ secrets.PHONE }}
        PASSWORD: ${{ secrets.PASSWORD }}
      run: |
        # 使用 xvfb-run 启动一个 1280x1024 的虚拟屏幕来运行你的脚本
        xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" python checkxxt7.py
