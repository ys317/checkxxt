name: Chaoxing Homework Checker

on:
  push:
    branches: [ main ] # 当你提交代码到 main 分支时触发运行
  schedule:
    # 每天定时运行（注意：GitHub Actions 的 cron 使用的是 UTC 世界标准时间）
    # 北京时间(UTC+8) 早上 08:00 = UTC时间 00:00
    # 北京时间(UTC+8) 晚上 20:00 = UTC时间 12:00
    - cron: '0 0,12 * * *'
  workflow_dispatch: # 允许你在 GitHub 页面上手动点击按钮触发运行

jobs:
  run-crawler:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v3

    - name: 设置 Python 环境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10' # 修正了这里的参数名

    - name: 安装 Python 依赖库
      run: |
        python -m pip install --upgrade pip
        pip install requests playwright  # 直接在这里安装你需要的库，不再需要 requirements.txt

    - name: 安装 Playwright 浏览器内核
      run: |
        # 只安装 chromium 内核及 Linux 系统底层依赖以节省 Actions 时间和带宽
        python -m playwright install chromium --with-deps

    - name: 运行超星检测脚本
      env:
        # 将 GitHub Secrets 中的安全隐私变量映射进系统环境变量
        ENABLE_WECOM_PUSH: ${{ secrets.ENABLE_WECOM_PUSH }}
        WECOM_URL: ${{ secrets.WECOM_URL }}
        PHONE: ${{ secrets.PHONE }}
        PWD: ${{ secrets.PWD }}
      run: |
        python checkxxt7.py
